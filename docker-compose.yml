name: trello

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trello
      POSTGRES_PASSWORD: trello
      POSTGRES_DB: trello
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trello -d trello"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - backend
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/trello;
      mc anonymous set download local/trello;
      exit 0;
      "

  api:
    build:
      context: ../Trello-Clone-Backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend-user:
    build:
      context: ../Trello-Clone-Frontend
      dockerfile: apps/user/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    networks:
      - frontend
      - backend

  frontend-admin:
    build:
      context: ../Trello-Clone-Frontend
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8081:80"
    networks:
      - frontend
      - backend

  landing:
    build:
      context: ../Trello-Clone-Frontend/apps/landing
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_USER_APP_URL: ${LANDING_USER_APP_URL:-http://103.179.189.81}
        NEXT_PUBLIC_SITE_URL: ${LANDING_SITE_URL:-http://103.179.189.81:3000}
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - frontend

networks:
  frontend:
  backend:

volumes:
  pgdata:
  miniodata:
